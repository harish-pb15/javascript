<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the number</title>

</head>

<body>
    <div id="wrapper"></div>
    <h1>Number Guessing game </h1>
    <p>Try and guess a random number between 1 and 100.</p>
    <p>You have 10 attempts to guess the right number.</p>
    <form class="form">
        <label for="guessField" id="guess">Guess a number</label>
        <input type="text" id="guessField" placeholder="Enter a number" class="guessField">
        <input type="submit" id="subt" value="Submit guess" class="guessSubmit"> <!--also it can be done using button-->
    </form>
    <div class="resultParas">
        <p>Previous Guesses: <span class="guesses"></span></p>
        <p>Guesses Remaining: <span class="lastResult"></span></p>
        <p class="lowOrHi"></p>
    </div>
</body>
<script>
    let randomNumber = parseInt(Math.random() * 100 + 1) // to generate a random number between 0 to 100
    const submit = document.querySelector('#subt')   // for submit button
    const userInput = document.querySelector('#guessField') // for user input means user jo number enter krega vo
    const guessSlot = document.querySelector('.guesses') // to maintain the record for the previous guesses
    const remaining = document.querySelector('.lastResult') // to show the number of guesses remaining 
    const lowOrHi = document.querySelector('.lowOrHi') // to tell the user to guess low or high
    const startOver = document.querySelector('.resultParas') // class which contains the results and isme hum p ko as a child append krege for starting the new game
    const p = document.createElement('p') // new paragraph create for creating a button for starting of new Game

    let prevGuess = [] // this is not used in this code
    let numGuess = 1

    let playGame = true

    if (playGame) {
        submit.addEventListener('click', function (e) {
            e.preventDefault()
            const guess = parseInt(userInput.value)
            validateGuess(guess)
        })
    }
    function validateGuess(guess) {
        if (isNaN(guess)) {
            alert('Please enter a valid number')
        }
        else if (guess < 1 || guess > 100) {
            alert('Please enter a valid number')
        }
        else {
            prevGuess.push(guess)
            if (numGuess === 11) {
                displayGuess(guess)
                displayMessage(`Game Over.Random number was ${randomNumber}`)
                endGame()
            }
            else {
                displayGuess(guess)
                checkGuess(guess)
            }
        }
    }

    function checkGuess(guess) {
        if (guess === randomNumber) {
            displayMessage(`You guessed it right`)
            endGame()
        }
        else if (guess < randomNumber) {
            displayMessage(`guessed Number is too low`)
        }
        else if (guess > randomNumber) {
            displayMessage(`guessed Number is too high`)
        }
    }

    function displayGuess(guess) {  // function to clear the input box and show the number guessed in the previous guesses
        userInput.value = '' // clears input box
        guessSlot.innerHTML += `${guess}  ` // previous guesses  add on to the string
        numGuess++;
        remaining.innerHTML = `${11 - numGuess}`
    }
    function displayMessage(message) {
        lowOrHi.innerHTML = `<h2>${message}</h2>`
    }

    function endGame() {
        userInput.value = ''
        userInput.setAttribute('disabled', '') // key pair value me dena hota hai isme 
        p.classList.add('button')
        p.innerHTML = `<h2 id ="newGame"> Start new Game</h2>`
        startOver.appendChild(p)
        playGame = false
        newGame()
    }

    function newGame() {
        const newGameButton = document.querySelector('#newGame')
        newGameButton.addEventListener('click', function (e) {
            randomNumber = parseInt(Math.random() * 100 + 1);
            prevGuess = []
            numGuess = 1
            guessSlot.innerHTML = ''
            remaining.innerHTML = `${11 - numGuess}`
            userInput.removeAttribute('disabled')
            startOver.removeChild(p);
            playGame = true
        })
    }
</script>

</html>
