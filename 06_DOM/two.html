<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>

<body style="background-color: #212121;color: aliceblue;">
    <div class="parent">
        <div class="day">Monday</div>
        <div class="day">Tuesday</div>
        <div class="day">Wednesday</div>
        <div class="day">Thursday</div>
        <div class="day">Friday</div>
    </div>
</body>
<script>
    const parent = document.querySelector('.parent')
    console.log(parent);
    console.log(parent.children); // it will return the HTMLCollection and as it is an array liked element so some properties of array can be  used in it 
    console.log(parent.children[0].innerHTML)

    for (let i = 0; i < parent.children.length; i++) {
        console.log(parent.children[i].innerHTML);

    }

    parent.children[1].style.color = "orange"

    console.log(parent.firstElementChild);
    console.log(parent.lastElementChild);

    const dayOne = document.querySelector('.day')
    console.log(dayOne);
    console.log(dayOne.parentElement)
    console.log(dayOne.nextElementSibling)

    console.log("NODES: ", parent.childNodes); //it will return the nodelist containing all child nodes of an element and 
    //Important thing is that it includes spaces,comments and new lines also along with HTML elements

</script>

</html>
