<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React</title>
</head>

<body>
    <button>Button clicked</button>
</body>
<script>
    // doubt: class ke andar agar apni property ya method access karni ho to this lagana padta hai
    class React {
        constructor() {
            this.library = "React"
            this.server = "https://localhost:300"

            // requirement :- jaise hi ye page load ho button ka mujhe reference mil jaaye and click krne pe kuchh ho jaaye console me 
            document.querySelector('button')
                .addEventListener('click', this.handleClick.
                bind(this)) //bind() kisi function ke this ko permanently kisi object se jod (bind) deta hai.
        }
        handleClick() {
            console.log("button clicked");
            console.log(this.server);
        }
    }

    const app = new React()
</script>

</html>
