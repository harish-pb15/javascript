<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard</title>
    <style>
        body {
            background-color: #212121;
            color: azure;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        table {
            border-collapse: collapse;
            width: 500px;
            max-width: 90%;
            background-color: #2c2c2c;
            color: #ffffff;
            text-align: center;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        th {
            background-color: #00bcd4;
            color: white;
            padding: 15px;
            font-size: 18px;
            letter-spacing: 1px;
        }

        td {
            padding: 15px;
            font-size: 17px;
            border-top: 1px solid #444;
        }

        tr:nth-child(even) {
            background-color: #383838;
        }

        tr:hover {
            background-color: #4a4a4a;
            transition: 0.3s ease;
        }

        .color {
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="project">
        <div id="insert">
            <div class="key">Press the key and watch the Magic</div>
        </div>
    </div>
</body>

<script>
    const insert = document.getElementById('insert')
    //window.addEventListener() is used to listen for events that happen on the browser window.
    window.addEventListener('keydown', (e) => {
        insert.innerHTML = `
        <div class ='color' >
            <table>
  <tr>
    <th>Key</th>
    <th>Keycode</th>
    <th>Code</th>
  </tr>
  <tr>
    <td>${e.key === " " ? "Space" : e.key}</td>
    <td>${e.keyCode}</td>
    <td>${e.code}</td>
  </tr>

</table>
</div>
        `

    })
</script>

</html>
