    <h1>Chai or code</h1>
    <button id="start">Start</button>
    <button id="stop">Stop</button>

<script>
    // setInterval:-setInterval() is a JavaScript function that repeatedly executes a function after a fixed time interval until you stop it.
    //SYNTAX :- setInterval(function, delay, ...args);    

    const sayDate = function (str) {
        console.log(str, Date.now())
    }
    const IntervalID = setInterval(sayDate, 1000, "hi")

    //clearInterval is used to stop setInterval
    clearInterval(IntervalID)
</script>
